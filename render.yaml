services:
  - type: web
    name: inventario-restaurante
    env: node
    plan: free
    buildCommand: rm -rf node_modules && npm ci && npm rebuild sqlite3 --build-from-source
    startCommand: npm start
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 20.11.1
